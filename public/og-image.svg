    <path d="M195.22,30.26l-53.91,53.92,53.91,53.91v29.61l-.13.13-71.84-71.84c-6.52-6.52-6.52-17.09,0-23.6L195.09.53l.13.13v29.6Z" fill="url(#koda)"/>
    <path d="M66.33,127.29l-43.38-43.38,43.38-43.39V10.66L4.88,72.11c-6.51,6.52-6.51,17.09,0,23.6l61.45,61.45v-29.87Z" fill="url(#koda)"/>
